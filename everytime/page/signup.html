<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 페이지</title>
    <link rel="stylesheet" href="../css/signup.css" />
  </head>
  <body>
    <div class="signup-body">
      <section>
        <h2>에브리타임 회원가입</h2>
        <p class="title-p">
          에브리타임 계정으로
          <span style="color: black">캠퍼스픽, 에브리타임</span> 등
        </p>
        <p class="title-p1">
          다양한 대학생 서비스를 모두 이용하실 수 있습니다.
        </p>
      </section>
      <form class="signup-info">
        <div class="name">
          <p>이름</p>
          <input id="name" type="text" placeholder="이름을 입력하세요." />
        </div>
        <div class="nick-name">
          <p>닉네임</p>
          <input
            id="nick-name"
            type="text"
            placeholder="닉네임을 입력하세요."
          />
        </div>
        <div class="e-mail">
          <p>이메일</p>
          <input id="e-mail" type="email" placeholder="이메일을 입력하세요." />
        </div>
        <div class="signup-pw">
          <p>비밀번호</p>
          <input
            id="signup-pw"
            type="password"
            placeholder="숫자/문자 조합, 최소 8자 이상"
          />
        </div>
        <div class="signup-pw-retry">
          <p>비밀번호 재입력</p>
          <input
            id="signup-pw-retry"
            type="password"
            placeholder="비밀번호를 재입력하세요."
          />
        </div>
        <div>
          <button id="signup-button" type="button">회원가입</button>
        </div>
      </form>
    </div>

    <script src="../js/signup.js"></script>
  </body>
</html>
